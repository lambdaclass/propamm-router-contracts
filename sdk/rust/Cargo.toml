[package]
name = "propamm-sdk"
version = "0.1.0"
edition = "2024"
description = "Rust SDK for interacting with the PropAMM contracts"
license = "MIT"

[dependencies]
alloy = { version = "2.0.5", features = ["full"] }
async-trait = "0.1.89"
futures-util = "0.3.32"
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["rt", "macros", "time", "sync"] }
tokio-tungstenite = { version = "0.29.0", features = ["rustls-tls-webpki-roots"] }

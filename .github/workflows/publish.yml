name: Publish

# Publishes the two SDK packages to their registries.
#
# Triggered by pushing a version tag (each package versions independently):
#   npm-v1.2.3    -> publishes sdk/typescript (`propamm`) to npm
#   crate-v1.2.3  -> publishes sdk/rust (`propamm`) to crates.io
#
# Or run manually from the Actions tab via "Run workflow" and pick a package.
#
# Required repository secrets:
#   NPM_TOKEN             npm automation token with publish rights for `propamm`
#   CARGO_REGISTRY_TOKEN  crates.io API token with publish-new + publish-update

on:
  push:
    tags:
      - "npm-v*"
      - "crate-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish
        type: choice
        options:
          - npm
          - crate
          - both
        default: both

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: npm (propamm)
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/npm-v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'npm' || inputs.package == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gated publish: add required reviewers and scope NPM_TOKEN to this
    # environment under Settings -> Environments -> npm-publish.
    environment: npm-publish

    # id-token: write enables npm provenance (a signed link from the published
    # package back to this workflow run). Public repo + public package only.
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: sdk/typescript

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          package_json_file: sdk/typescript/package.json

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint and check formatting
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Treat an already-published version as success so re-runs don't fail.
        run: |
          OUTPUT=$(pnpm publish --no-git-checks --provenance 2>&1) || {
            if echo "$OUTPUT" | grep -qE "previously published|cannot publish over"; then
              echo "propamm already published at this version, continuing"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }

  crate:
    name: crates.io (propamm)
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/crate-v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'crate' || inputs.package == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Gated publish: add required reviewers and scope CARGO_REGISTRY_TOKEN to
    # this environment under Settings -> Environments -> crates-io-publish.
    environment: crates-io-publish

    defaults:
      run:
        working-directory: sdk/rust

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: sdk/rust

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Treat an already-published version as success so re-runs don't fail.
        run: |
          OUTPUT=$(cargo publish 2>&1) || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "propamm already published at this version, continuing"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
